<style>
        body {
            background-color: #0B0B0B;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .inner-glow {
            position: relative;
        }

        .inner-glow::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 0.5px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
        }

        .mesh-background {
            position: absolute;
            inset: 0;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(228, 228, 204, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(228, 228, 204, 0.02) 0%, transparent 40%);
            z-index: -1;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: #BCCEC1;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #BCCEC1;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.7; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.9); opacity: 0.7; }
        }

        .custom-checkbox:checked {
            background-color: #F5F5DC;
            border-color: #F5F5DC;
        }
    </style>

<script>
        // Micro-interaction for input fields
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-on-surface-variant', 'text-primary-fixed');
            });
            input.addEventListener('blur', () => {
                input.parentElement.parentElement.querySelector('label').classList.replace('text-primary-fixed', 'text-on-surface-variant');
            });
        });
    </script>
